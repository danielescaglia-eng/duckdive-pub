<style>
  :root{
    --black:#0E0E0E;
    --amber:#FEC64A;
    --blue:#4462AD;
    --terra:#DD8F68;
    --salmon:#EEA193;
    --pink:#EFB9D3;
    --logo:#FFC538;
    --red:#C0392B;
    --tag:#8E3B2C;
    --ink:#0E0E0E;
    --cream:#EFE6D0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--black);
    font-family:'Space Mono',monospace;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  /* language-specific font fallbacks */
  body.lang-zh{font-family:'Noto Sans SC',sans-serif}
  body.lang-ar{font-family:'Noto Naskh Arabic',serif}
  .title-font{font-family:'Bevan','Noto Serif SC','Noto Kufi Arabic',serif}
  .item-font{font-family:'Zilla Slab','Noto Serif SC','Noto Kufi Arabic',serif;font-weight:700}

  /* ---------- LANGUAGE BAR ---------- */
  .langbar{
    position:sticky;top:0;z-index:50;
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    background:#0E0E0E;padding:10px 8px;border-bottom:2px solid var(--logo);
  }
  .langbar button{
    font-family:'Space Mono',monospace;font-weight:700;font-size:13px;
    letter-spacing:.5px;cursor:pointer;
    background:transparent;color:var(--logo);
    border:1.5px solid var(--logo);border-radius:30px;
    padding:6px 13px;transition:.15s;
  }
  .langbar button:hover{background:rgba(255,197,56,.15)}
  .langbar button.active{background:var(--logo);color:#0E0E0E}

  /* ---------- PAGE WRAPPER ---------- */
  .sheet{max-width:1100px;margin:0 auto}

  /* ---------- COVER ---------- */
  .cover{
    background:#000;position:relative;
    min-height:78vh;padding:40px 30px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .cover .logo-top{position:absolute;top:34px;right:34px;width:135px}
  .cover .logo-top img{width:100%;display:block}
  .menu-word{
    font-size:clamp(120px,30vw,300px);line-height:.82;
    color:var(--logo);letter-spacing:-2px;text-align:center;
  }
  body.lang-ar .cover .logo-top{right:auto;left:34px}

  /* ---------- MAIN GRID ---------- */
  .menu-grid{display:grid;grid-template-columns:1fr 1fr}
  .col{display:flex;flex-direction:column}
  .pad{padding:30px 26px}

  .bg-amber{background:var(--amber)}
  .bg-blue{background:var(--blue);color:var(--cream)}
  .bg-terra{background:var(--terra)}
  .bg-salmon{background:var(--salmon)}
  .bg-pink{background:var(--pink)}

  .sec-title{
    font-size:clamp(38px,6vw,62px);line-height:.95;color:var(--ink);
    margin-bottom:6px;
  }
  .bg-blue .sec-title{color:var(--cream)}
  .tapas-title{color:var(--red)}

  .badge{
    display:inline-block;font-family:'Space Mono',monospace;font-weight:700;
    font-size:11px;letter-spacing:1px;padding:5px 12px;margin:4px 0 10px;
    border-radius:4px;text-transform:uppercase;
  }
  .badge-dark{background:#0E0E0E;color:#fff}
  .badge-outline{border:1.5px solid currentColor;color:#0E0E0E}
  .bg-blue .badge-outline{color:var(--cream)}
  .badge-pill{border:1.5px solid var(--terra);color:#0E0E0E;background:rgba(255,255,255,.25)}

  .divider{height:14px;margin:18px 0;
    background:
      radial-gradient(circle at 7px 11px, transparent 6px, var(--ink) 6px 7px, transparent 7px) 0 0/14px 14px repeat-x;
    opacity:.85}
  .bg-blue .divider, .bg-terra .divider{filter:invert(0)}

  /* signature cocktail item */
  .sig{display:flex;gap:14px;margin:16px 0}
  .sig .icon{flex:0 0 38px;width:38px;height:54px}
  .sig .body{flex:1}
  .item-name{font-size:21px;color:var(--ink);line-height:1.1}
  .tagline{color:var(--tag);font-style:italic;font-size:12.5px;margin:3px 0 6px;line-height:1.35}
  .desc{font-size:12.5px;line-height:1.45;color:#2a2118}
  .bg-blue .desc{color:var(--cream)}

  /* slider scales */
  .scales{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  .scale{display:flex;align-items:center;gap:7px;
    border:1.5px solid var(--ink);border-radius:30px;padding:3px 11px;
    font-family:'Space Mono',monospace;font-weight:700;font-size:10px;letter-spacing:.5px}
  .track{position:relative;width:46px;height:2px;background:var(--ink)}
  .track::before{content:"";position:absolute;top:-3px;width:8px;height:8px;border-radius:50%;
    background:var(--ink);left:var(--p,50%);transform:translateX(-50%)}

  /* simple priced rows */
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:14px;margin:9px 0}
  .row .name{font-size:19px}
  .row .price,.head-price{font-size:30px;line-height:1}
  .row-desc .name{display:block}
  .sub-tag{color:var(--tag);font-style:italic;font-size:12px;margin-top:1px}
  .bg-blue .sub-tag{color:#dfe6f5}

  .sec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .head-price{color:var(--ink)}
  .bg-blue .head-price{color:var(--cream)}
  .tapas-title ~ .head-price,.tapas-price{color:var(--red)}

  /* bocce / illustration */
  .illus-row{display:flex;justify-content:space-between;align-items:flex-end;gap:14px}
  .bottle{width:88px;flex:0 0 88px}
  .spirits{font-size:13px;font-weight:700;margin-bottom:8px;letter-spacing:.3px}
  .note{font-size:12.5px;line-height:1.5;margin:7px 0}

  /* beers */
  .beer-flags{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0 4px}
  .flag{display:inline-flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;
    font-weight:700;font-size:10px;letter-spacing:.5px;border:1.5px solid #0E0E0E;border-radius:30px;padding:3px 9px}
  .flag.ml{border:none;font-size:14px;padding:0 2px}
  .beers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;margin-top:14px}
  .beers .g{width:46px;height:64px;margin:0 auto 6px}
  .beers .bn{font-size:14px;line-height:1.05}
  .beers .pc{font-family:'Space Mono',monospace;font-size:11px;margin:3px 0 4px}
  .beers .bp{font-size:26px}

  /* tapas */
  .tapas-row{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-top:6px}
  .dish{width:120px;flex:0 0 120px}

  /* ---------- BACK ---------- */
  .back{background:#000;text-align:center;padding:60px 30px 40px}
  .back img{width:min(260px,60vw);display:block;margin:0 auto 30px}
  .back .foot{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;
    font-family:'Space Mono',monospace;font-size:12px;color:#cfcfcf;letter-spacing:.5px}
  .back .foot b{color:var(--logo)}

  /* RTL */
  body.lang-ar{direction:rtl}
  body.lang-ar .sig{flex-direction:row-reverse}
  body.lang-ar .cover .menu-word{direction:rtl}

  /* responsive */
  @media(max-width:760px){
    .menu-grid{grid-template-columns:1fr}
    .cover{min-height:62vh}
    .cover .logo-top{width:104px;top:20px;right:20px}
  }
  @media print{
    .langbar{display:none}
    body{background:#fff}
    .cover,.back{min-height:auto}
  }
</style>

};
const ORDER = ['it','en','es','fr','de','zh','ar'];

/* ===================== SVG ICONS ===================== */
function svgCocktail(c){return `<svg class="icon" viewBox="0 0 38 54" fill="none" stroke="#0E0E0E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h26L19 27z" fill="${c}"/><path d="M19 27v18"/><path d="M11 46h16"/><circle cx="30" cy="6" r="3.2" fill="${c}" stroke="none"/></svg>`;}
function svgGlass(fill){return `<svg class="g" viewBox="0 0 46 64" stroke="#0E0E0E" stroke-width="2.4" stroke-linejoin="round"><path d="M9 6h28l-4 54H13z" fill="${fill}"/><path d="M11 20h24" stroke="none"/><path d="M11.3 19h23.4l-1.7 22H13z" fill="#EFE6D0" stroke="none"/><path d="M9 6h28l-4 54H13z" fill="none"/></svg>`;}
function svgBottle(){return `<svg class="bottle" viewBox="0 0 60 150" stroke="#0E0E0E" stroke-width="2.2" stroke-linejoin="round"><rect x="24" y="4" width="12" height="14" rx="2" fill="#C8742F"/><path d="M22 18h16v14c0 4 8 8 8 18v82a6 6 0 0 1-6 6H20a6 6 0 0 1-6-6V50c0-10 8-14 8-18z" fill="#2E437A"/><rect x="16" y="70" width="28" height="40" rx="3" fill="#3C56A0" stroke="none"/><text x="30" y="86" font-family="Bevan, serif" font-size="11" fill="#FFC538" text-anchor="middle" stroke="none">DUCK</text><text x="30" y="100" font-family="Bevan, serif" font-size="11" fill="#FFC538" text-anchor="middle" stroke="none">DIVE</text></svg>`;}
function svgDish(){return `<svg class="dish" viewBox="0 0 120 80" stroke="#0E0E0E" stroke-width="2.2"><ellipse cx="60" cy="44" rx="52" ry="30" fill="#D79A3E"/><ellipse cx="60" cy="40" rx="40" ry="22" fill="#E9B968"/><path d="M40 40c6-8 34-8 40 0" stroke="#9B5A2B" fill="none" stroke-width="3"/><circle cx="48" cy="38" r="4" fill="#B5402F" stroke="none"/><circle cx="72" cy="42" r="4" fill="#3FA46A" stroke="none"/><circle cx="60" cy="34" r="3.5" fill="#B5402F" stroke="none"/></svg>`;}

/* ===================== RENDER ===================== */
function scale(la,lb,p){return `<span class="scale">${la}<span class="track" style="--p:${p}%"></span>${lb}</span>`;}

function render(lang){
  const t = T[lang];
  document.documentElement.lang = lang;
  document.body.className = 'lang-'+lang;

  // static keys
  document.querySelectorAll('[data-k]').forEach(el=>{el.innerHTML = t[el.dataset.k];});

  // signature items
  const sigHTML = SIG.map(s=>`
    <div class="sig">
      ${svgCocktail(s.color)}
      <div class="body">
        <div class="item-name item-font">${s.name}</div>
        <div class="tagline">${t[s.dkey+'_tag']}</div>
        <div class="desc">${t[s.dkey+'_desc']}</div>
        <div class="scales">
          ${scale(t.sweet,t.sour,s.ss)}
          ${scale(t.chill,t.wild,s.cw)}
        </div>
      </div>
    </div>`).join('');

  // G&T rows
  const gtHTML = GT.map(g=>{
    const nm = g.name==='__ginEsteri__'? t.ginEsteri : g.name;
    return `<div class="row"><span class="name item-font">${nm}</span><span class="price item-font">${g.price}</span></div>`;
  }).join('');

  // beers
  const beerHTML = BEERS.map(b=>`
    <div><div>${svgGlass(b.fill)}</div>
      <div class="bn item-font">${b.name}</div>
      <div class="pc">${b.vol}vol</div>
      <div class="bp item-font">${b.price}</div></div>`).join('');

  const left = `
    <div class="col bg-amber pad">
      <div class="sec-head"><h2 class="sec-title title-font">${t.cocktails}</h2></div>
      <div class="sec-head" style="margin-top:6px">
        <h3 class="item-name item-font">${t.signature}</h3><span class="head-price item-font">10</span>
      </div>
      <span class="badge badge-outline">${t.badgeTop}</span>
      ${sigHTML}

      <div class="divider"></div>
      <h2 class="sec-title title-font" style="font-size:clamp(30px,5vw,46px)">${t.gt}</h2>
      <span class="badge badge-dark">${t.badgeLove}</span>
      ${gtHTML}

      <div class="divider"></div>
      <h2 class="sec-title title-font" style="font-size:clamp(30px,5vw,46px)">${t.cocktail}</h2>
      <div class="row row-desc"><span><span class="name item-font">${t.classici}</span><span class="sub-tag">${t.classiciDesc}</span></span><span class="price item-font">8</span></div>
      <div class="row row-desc"><span><span class="name item-font">${t.deluxe}</span><span class="sub-tag">${t.deluxeDesc}</span></span><span class="price item-font">12</span></div>

      <div class="divider"></div>
      <div class="sec-head"><h2 class="sec-title title-font" style="font-size:clamp(30px,5vw,46px)">${t.analcolici}</h2><span class="head-price item-font">7</span></div>
      <div class="row row-desc"><span><span class="name item-font">The Lazy One</span><span class="desc">${t.lazyDesc}</span></span></div>
      <div class="row row-desc"><span><span class="name item-font">Sweet Dream</span><span class="desc">${t.sweetDesc}</span></span></div>
    </div>`;

  const right = `
    <div class="col">
      <div class="bg-blue pad">
        <div class="sec-head"><h2 class="sec-title title-font">${t.bocce}</h2><span class="head-price item-font">80-100</span></div>
        <span class="badge badge-outline">${t.badgeParty}</span>
        <div class="illus-row"><div>
          <div class="spirits">${t.spirits}</div>
          <div class="note">${t.bocceNote1}</div>
          <div class="note">${t.bocceNote2}</div>
        </div>${svgBottle()}</div>
      </div>

      <div class="bg-terra pad">
        <div class="sec-head"><h2 class="sec-title title-font">${t.birre}</h2></div>
        <div class="beer-flags">
          <span class="flag">${t.onTap}</span>
          <span class="flag">${t.glutenFree}</span>
          <span class="flag ml">0,4l</span>
        </div>
        <span class="badge badge-dark">${t.lovely}</span>
        <div class="beers">${beerHTML}</div>
      </div>

      <div class="bg-salmon pad">
        <div class="sec-head"><h2 class="sec-title title-font" style="font-size:clamp(28px,4.4vw,40px)">${t.amari}</h2><span class="head-price item-font">5</span></div>
        <div class="sub-tag">${t.amariTag}</div>
        <div class="sec-head" style="margin-top:14px"><h2 class="sec-title title-font" style="font-size:clamp(28px,4.4vw,40px)">${t.distillati}</h2><span class="head-price item-font">5-10</span></div>
        <div class="sub-tag">${t.distillatiTag}</div>
        <div class="sec-head" style="margin-top:14px"><h2 class="sec-title title-font" style="font-size:clamp(28px,4.4vw,40px)">${t.vino}</h2><span class="head-price item-font">6</span></div>
        <div class="sub-tag">${t.vinoTag}</div>
        <div class="sec-head" style="margin-top:14px"><h2 class="sec-title title-font" style="font-size:clamp(28px,4.4vw,40px)">${t.softs}</h2><span class="head-price item-font">5</span></div>
        <div class="sub-tag">${t.softsTag}</div>
      </div>

      <div class="bg-pink pad" style="flex:1">
        <div class="sec-head"><h2 class="sec-title title-font tapas-title">${t.tapas}</h2><span class="head-price item-font tapas-price">5</span></div>
        <div class="tapas-row"><div class="sub-tag" style="max-width:55%">${t.tapasTag}</div>${svgDish()}</div>
      </div>
    </div>`;

  document.getElementById('grid').innerHTML = left + right;
}

/* ===================== LANG BAR ===================== */
const bar = document.getElementById('langbar');
ORDER.forEach(l=>{
  const b=document.createElement('button');
  b.innerHTML = T[l].langName;
  b.dataset.l=l;
  b.onclick=()=>{setLang(l);};
  bar.appendChild(b);
});
function setLang(l){
  render(l);
  [...bar.children].forEach(b=>b.classList.toggle('active', b.dataset.l===l));
  try{localStorage.setItem('ddlang',l);}catch(e){}
}
setLang(localStorage.getItem('ddlang') && T[localStorage.getItem('ddlang')] ? localStorage.getItem('ddlang') : 'it');
</script>
</body>
</html>
